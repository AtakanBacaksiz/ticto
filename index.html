  // ════════════════════════════════════════════════════════════
  function showFloatingReaction(emoji) {
    const el = document.createElement('div');
    el.className = 'floating-reaction';
    el.textContent = emoji;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  function sendReaction(emoji) {
    if (net.mode === 'local' || !net.conn || !net.conn.open) return;
    showFloatingReaction(emoji);
    sendNet({ type: 'reaction', emoji });
  }

  // ════════════════════════════════════════════════════════════
  // VOICE CHAT (push to talk)
  // ════════════════════════════════════════════════════════════
  let localStream = null, pttCall = null;

  async function initVoice() {
    if (localStream) return true;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      localStream.getAudioTracks().forEach(t => t.enabled = false);
      return true;
    } catch(e) { return false; }
  }

  function hookVoiceCall(call) {
    pttCall = call;
    call.on('stream', remoteStream => {
      const audio = document.getElementById('remote-audio');
      audio.srcObject = remoteStream;
    });
    call.on('close', () => { pttCall = null; });
    call.on('error', () => { pttCall = null; });
  }

  function startVoice() {
    if (!net.peer) return;
    if (net.mode === 'guest') {
      net.peer.on('call', call => {
        initVoice().then(ok => {
          call.answer(ok ? localStream : undefined);
          hookVoiceCall(call);
        });
      });
    } else if (net.mode === 'host') {
      initVoice().then(ok => {
        if (!ok || !net.conn || !net.conn.open) return;
        const call = net.peer.call(net.conn.peer, localStream);
        if (call) hookVoiceCall(call);
      });
    }
  }

  function stopVoice() {
    try { if (pttCall) pttCall.close(); } catch(e) {}
    pttCall = null;
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    setPttActive(false);
    setThemTalking(false);
  }

  function setPttActive(on) {
    const btn = document.getElementById('ptt-btn');
    const hint = document.getElementById('ptt-hint');
    if (!btn) return;
    btn.classList.toggle('active', on);
    if (hint && !hint.classList.contains('them')) hint.textContent = on ? 'talking…' : 'hold to talk';
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = on);
  }

  function setThemTalking(on) {
    const hint = document.getElementById('ptt-hint');
    if (!hint || document.getElementById('ptt-btn')?.classList.contains('active')) return;
    if (on) { hint.textContent = '● them'; hint.classList.add('them'); }
    else     { hint.textContent = 'hold to talk'; hint.classList.remove('them'); }
  }

  // ════════════════════════════════════════════════════════════
  // TEXT CHAT
  // ════════════════════════════════════════════════════════════
  function appendChatMsg(text, isMine) {
    const log = document.getElementById('chat-log');
    if (!log) return;
    const msg = document.createElement('div');
    msg.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
    msg.textContent = text;
    log.appendChild(msg);
    log.scrollTop = log.scrollHeight;
  }

  function sendChatMsg() {
    const input = document.getElementById('chat-text-input');
    if (!input) return;
    const text = input.value.trim().slice(0, 200);
    if (!text || net.mode === 'local' || !net.conn || !net.conn.open) return;
    appendChatMsg(text, true);
    sendNet({ type: 'chat', text });
    input.value = '';
    document.getElementById('ptt-btn')?.classList.remove('hidden');
    document.getElementById('chat-send-btn')?.classList.add('hidden');
  }

  // ════════════════════════════════════════════════════════════
  // ROUNDS (ROUND_GAMES games per round)
  // ════════════════════════════════════════════════════════════
  function endRound(fromNet=false) {
    // Determine round winner and update round tally.
    if (G.scores.X > G.scores.O) G.rounds.X++;
    else if (G.scores.O > G.scores.X) G.rounds.O++;
    G.scores = { X:0, O:0 };
    updateScoreBar();
    if (net.mode !== 'local' && !fromNet) sendNet({ type: 'round-end', rounds: G.rounds });
    restart(fromNet);
  }

  function restart(fromNet=false) {
    const next = net.mode!=='local' ? 'X'
      : G.winner==='X' ? 'O'
      : G.winner==='O' ? 'X'
      : G.turn==='X'   ? 'O' : 'X';
    clearTimeout(convPromptTimer);
    const cp=document.querySelector('.conv-prompt-overlay'); if(cp) cp.remove();
    G={...G, board:Array(9).fill(null), turn:next, over:false, winner:null, winIdx:-1, placementOrder:[]};
    clearOldestMarker();
    cellEls.forEach(c=>{c.classList.remove('filled','win-cell');c.innerHTML='';});
    winLine.setAttribute('x1',0);winLine.setAttribute('y1',0);
    winLine.setAttribute('x2',0);winLine.setAttribute('y2',0);
    winLine.classList.remove('drawn');
    winLine.style.strokeDasharray=''; winLine.style.strokeDashoffset='';
    winSvg.style.filter='';
    const ov=document.querySelector('.result-overlay'); if(ov) ov.remove();
    updateDots();
    if (net.mode!=='local'&&!fromNet) sendNet({type:'restart'});
  }

  cellEls.forEach(c=>c.addEventListener('click',()=>move(+c.dataset.i)));
  resetBtn.addEventListener('click',()=>restart());
  updateDots(); // ← init
  updateScoreBar(); // ← init

  // ════════════════════════════════════════════════════════════
  // HEARTBEAT + RECONNECT HELPERS
  // ════════════════════════════════════════════════════════════
  let pingInterval = null, pingMissed = 0;
  function startPing() {
    clearInterval(pingInterval); pingMissed = 0;
    pingInterval = setInterval(() => {
      if (!net.conn || !net.conn.open) return;
      pingMissed++;
      if (pingMissed > 3) { handleConnLost(); return; }
      sendNet({ type: 'ping' });
    }, 5000);
  }
  function stopPing() { clearInterval(pingInterval); pingInterval = null; pingMissed = 0; }

  // Wire the reconnect helpers (defined in src/reconnect.js) with live deps.
  // newPeer wraps the Peer constructor; PEER_CONFIG is closed over lazily so
  // this call can sit here even though PEER_CONFIG is declared further below.
  const { handleConnLost, attemptGuestReconnect, guestConnectToPeer } =
    makeReconnectModule({
      getNet:       () => net,
      newPeer:      id => new Peer(id, PEER_CONFIG),
      stopPing,
      updateBadge,
      onConnReopen,
      onConnData,
      onConnClose,
      now:          () => Date.now(),
    });

  // Called when a connection is re-established mid-game (no board reset).
  function onConnReopen() {
    net.reconnecting = false;
    updateBadge('connected');
    startPing();
    if (net.mode === 'host') {
      // Re-send role then current board state so guest can sync.
      sendNet({ type: 'role', role: net.myRole === 'X' ? 'O' : 'X' });
      sendNet({ type: 'state', board: G.board, turn: G.turn, scores: G.scores, rounds: G.rounds,
                over: G.over, winner: G.winner, winIdx: G.winIdx, placementOrder: G.placementOrder });
    }
  }

  // Re-render board state received from host after reconnect.
  function applyNetState(data) {
    G = { board: data.board || Array(9).fill(null), turn: data.turn || 'X',
          scores: data.scores || {X:0,O:0}, rounds: data.rounds || {X:0,O:0}, over: !!data.over,
          winner: data.winner || null, winIdx: data.winIdx !== undefined ? data.winIdx : -1,
          placementOrder: data.placementOrder || [] };
    clearOldestMarker();
    cellEls.forEach((c, i) => {
      c.classList.remove('filled','win-cell'); c.innerHTML = '';
      if (G.board[i]) { c.classList.add('filled'); c.appendChild(createMarkSVG(G.board[i])); }
    });
    winLine.setAttribute('x1',0); winLine.setAttribute('y1',0);
    winLine.setAttribute('x2',0); winLine.setAttribute('y2',0);
    winLine.classList.remove('drawn');
    winLine.style.strokeDasharray = ''; winLine.style.strokeDashoffset = '';
    winSvg.style.filter = '';
    if (G.over && G.winIdx >= 0) {
      setTimeout(() => { highlightWinCells(WINS[G.winIdx], G.winner); drawWinLine(G.winIdx, G.winner); }, 120);
      setTimeout(() => showOverlay(G.winner), 350);
    }
    updateOldestMarker(); updateDots(); updateScoreBar();
  }

  // ════════════════════════════════════════════════════════════
  // ONLINE / PEERJS
  // ════════════════════════════════════════════════════════════
  // Deploy server.js on Render.com (free) and paste the hostname below.
  // e.g. 'ticto-peer.onrender.com'  — leave null to use the public broker.
  const PEER_HOST = null;

  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' },
    { urls: 'turn:openrelay.metered.ca:80',    username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443',   username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
  ];

  const PEER_CONFIG = {
    ...(PEER_HOST
      ? { host: PEER_HOST, port: 443, path: '/', secure: true }
      : {}),
    config: { iceServers: ICE_SERVERS },
  };

  function genCode() {
    return Array.from({length:4},()=>CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]).join('');
  }

  const lobbyEl = document.getElementById('lobby');
  const LS_IDS  = ['ls-home','ls-waiting','ls-join','ls-connecting'];

  function showLS(id) {
    LS_IDS.forEach(s=>{const el=document.getElementById(s);if(el)el.classList.toggle('hidden',s!==id);});
  }
  function hideLobby() {
    lobbyEl.style.opacity='0'; lobbyEl.style.pointerEvents='none';
    setTimeout(()=>lobbyEl.classList.add('hidden'),330);
  }
  function showLobby() {
    lobbyEl.classList.remove('hidden');
    requestAnimationFrame(()=>{lobbyEl.style.opacity='';lobbyEl.style.pointerEvents='';});
    showLS('ls-home');
  }
  function showLobbyErr(msg) {
    const el=document.getElementById('lobby-err');
    el.textContent=msg; el.classList.remove('hidden');
    clearTimeout(el._t); el._t=setTimeout(()=>el.classList.add('hidden'),5000);
  }

  function destroyPeer() {
    try{if(net.conn)net.conn.close();}catch(e){}
    try{if(net.peer)net.peer.destroy();}catch(e){}
    net.peer=null; net.conn=null;
  }

  function createGame(existingCode, retries=0) {
    if (typeof Peer==='undefined') { showLobbyErr('Still loading… try again.'); return; }
    const code=existingCode||genCode();
    net.code=code; net.mode='host';
    if (!existingCode) net.myRole = Math.random() < 0.5 ? 'X' : 'O';
    else if (!net.myRole) net.myRole = 'X';
    sessionStorage.setItem('ticto_host', JSON.stringify({code, ts:Date.now()}));
    document.getElementById('room-code-display').textContent=code;
    document.getElementById('copy-hint').textContent='tap to copy link';
    document.getElementById('copy-hint').classList.remove('copied');
    showLS('ls-waiting');
    destroyPeer();
    net.peer=new Peer('ticto-'+code, PEER_CONFIG);
    net.peer.on('error',err=>{
      console.error('[ticto] host peer error:', err.type, err);
      // Signaling-server blips don't affect an already-open DataChannel.
      // Also ignore them while a guest reconnect is in progress — the DataChannel
      // closed but the guest will come back; we must keep the same peer ID.
      if (shouldIgnoreHostPeerError(err.type, net)) return;
      net.peer.destroy();
      if (err.type==='unavailable-id') {
        // Server may still hold the old ID for a few seconds after an app-switch.
        // Retry with the same code (with backoff) before giving up and generating a new one.
        // Never generate a new code while reconnecting — the guest knows only the old one.
        const codeToRetry = net.reconnecting ? net.code : existingCode;
        if (codeToRetry && retries < 4) {
          setTimeout(()=>createGame(codeToRetry, retries+1), 1200*(retries+1));
        } else if (!net.reconnecting) {
          createGame(); // give up on this code, get a fresh one
        }
      } else if (isSignalingErr && retries < 3) {
        // Transient signalling-server errors — retry automatically.
        setTimeout(()=>createGame(existingCode||code, retries+1), 1500*(retries+1));
      } else {
        sessionStorage.removeItem('ticto_host');
        showLS('ls-home');
        showLobbyErr('Could not reach the server. Check your connection and try again.');
      }
    });
    net.peer.on('connection',conn=>{
      if(net.conn&&net.conn.open){conn.close();return;}
      net.conn=conn;
      conn.on('open', ()=>{ net.reconnecting ? onConnReopen() : onConnOpen(); });
      conn.on('data', onConnData);
      conn.on('close', onConnClose);
      conn.on('error', onConnClose);
    });
  }

  function joinGame() {
    if (typeof Peer==='undefined') { showLobbyErr('Still loading… try again.'); return; }
    const input=document.getElementById('code-input');
    const code=input.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,4);
    if (code.length<4) {
      input.classList.remove('shake'); void input.offsetWidth; input.classList.add('shake'); return;
    }
    net.code=code; net.mode='guest'; net.myRole='O';
    document.getElementById('join-error').classList.add('hidden');
    showLS('ls-connecting');
    destroyPeer();
    net.peer=new Peer(undefined, PEER_CONFIG);
    let peerOpened=false, gameJoined=false;
    const peerTimeout=setTimeout(()=>{ if(!peerOpened) showJoinErr(); },15000);
    // Only boot to error screen if game hasn't started — DataChannel works
    // independently of the signaling server once open.
    net.peer.on('error',()=>{ clearTimeout(peerTimeout); if(!gameJoined) showJoinErr(); });
    net.peer.on('open',()=>{
      peerOpened=true; clearTimeout(peerTimeout);
      const conn=net.peer.connect('ticto-'+code,{reliable:true});
      net.conn=conn;
      const timeout=setTimeout(()=>{ if(!gameJoined) showJoinErr(); },30000);
      conn.on('open',()=>{ gameJoined=true; clearTimeout(timeout); onConnOpen(); });
      conn.on('data', onConnData);
      conn.on('close', onConnClose);
      conn.on('error',()=>{ clearTimeout(timeout); if(!gameJoined) showJoinErr(); });
    });
  }

  function showJoinErr() {
    destroyPeer();
    net={mode:'local',peer:null,conn:null,myRole:null,code:null};
    showLS('ls-join');
    document.getElementById('join-error').classList.remove('hidden');
    setTimeout(()=>document.getElementById('code-input').focus(),80);
  }

  function initVoiceChat() { startVoice(); }
  function teardownVoiceChat() { stopVoice(); }

  function onConnOpen() {
    sessionStorage.removeItem('ticto_host');
    if (net.mode === 'host') sendNet({ type: 'role', role: net.myRole === 'X' ? 'O' : 'X' });
    hideLobby(); startOnlineGame();
    initVoiceChat();
  }

  function onConnData(data) {
    if(!data||typeof data.type!=='string') return;
    if(data.type==='ping') { sendNet({type:'pong'}); return; }
    if(data.type==='pong') { pingMissed=0; return; }
    if(data.type==='role'&&(data.role==='X'||data.role==='O')) { net.myRole=data.role; updateBadge('connected'); return; }
    if(data.type==='state') { applyNetState(data); return; }
    if(data.type==='move'&&typeof data.idx==='number') move(data.idx,true);
    if(data.type==='restart') restart(true);
    if(data.type==='reaction'&&typeof data.emoji==='string') showFloatingReaction(data.emoji);
    if(data.type==='ptt'&&typeof data.on==='boolean') setThemTalking(data.on);
    if(data.type==='chat'&&typeof data.text==='string') appendChatMsg(data.text.slice(0,200), false);
    if(data.type==='round-end' && data.rounds) { G.rounds = data.rounds; endRound(true); }
    if(data.type==='wheel-result' && data.emoji && data.text) {
      const ov = document.createElement('div'); ov.className = 'wheel-overlay';
      const closeBtn = document.createElement('div'); closeBtn.className = 'wheel-close-btn';
      closeBtn.textContent = '×'; closeBtn.setAttribute('role','button');
      closeBtn.addEventListener('click', () => ov.remove()); ov.appendChild(closeBtn);
      document.body.appendChild(ov);
      showWheelResult(ov, { emoji: data.emoji, text: data.text }, false, data.accent || null);
    }

  }

  function onConnClose() { handleConnLost(); }

  function sendNet(data) {
    if(net.conn&&net.conn.open){try{net.conn.send(data);}catch(e){}}
  }

  function startOnlineGame() {
    clearTimeout(convPromptTimer);
    const cp=document.querySelector('.conv-prompt-overlay');if(cp)cp.remove();
    G={board:Array(9).fill(null),turn:'X',scores:G.scores,rounds:G.rounds,over:false,winner:null,winIdx:-1,placementOrder:[]};
    clearOldestMarker();
    cellEls.forEach(c=>{c.classList.remove('filled','win-cell');c.innerHTML='';});
    winLine.setAttribute('x1',0);winLine.setAttribute('y1',0);
    winLine.setAttribute('x2',0);winLine.setAttribute('y2',0);
    winLine.classList.remove('drawn');
    winLine.style.strokeDasharray=''; winLine.style.strokeDashoffset='';
    winSvg.style.filter='';
    const ov=document.querySelector('.result-overlay');if(ov)ov.remove();
    document.getElementById('online-badge').classList.remove('hidden');
    document.getElementById('reaction-bar').classList.remove('hidden');
    document.getElementById('chat-log').classList.remove('hidden');
    document.getElementById('chat-input-row').classList.remove('hidden');
    startVoice();
    updateBadge('connected');
    startPing();
    updateDots();
  }

  function leaveOnlineGame() {
    stopPing();
    teardownVoiceChat();
    clearTimeout(convPromptTimer);
    const cp=document.querySelector('.conv-prompt-overlay');if(cp)cp.remove();
    sessionStorage.removeItem('ticto_host');
    destroyPeer();
    net={mode:'local',peer:null,conn:null,myRole:null,code:null,reconnecting:false};
    document.getElementById('online-badge').classList.add('hidden');
    document.getElementById('reaction-bar').classList.add('hidden');
    document.getElementById('chat-input-row').classList.add('hidden');
    document.getElementById('chat-log').classList.add('hidden');
    G={board:Array(9).fill(null),turn:'X',scores:{X:0,O:0},rounds:{X:0,O:0},over:false,winner:null,winIdx:-1,placementOrder:[]};
    clearOldestMarker();
    cellEls.forEach(c=>{c.classList.remove('filled','win-cell');c.innerHTML='';});
    winLine.setAttribute('x1',0);winLine.setAttribute('y1',0);
    winLine.setAttribute('x2',0);winLine.setAttribute('y2',0);
    winLine.classList.remove('drawn');
    winLine.style.strokeDasharray=''; winLine.style.strokeDashoffset='';
    winSvg.style.filter='';
    const ov=document.querySelector('.result-overlay');if(ov)ov.remove();
    updateDots(); updateScoreBar(); showLobby();
  }

  function updateBadge(status) {
    const dot=document.getElementById('badge-conn-dot');
    const role=document.getElementById('badge-role');
    dot.className='badge-conn-dot '+status;
    if(status==='connected'){
      role.textContent=net.myRole==='X'?'you are X':'you are O';
      role.style.color=net.myRole==='X'?'var(--x)':'var(--o)';
    } else if(status==='reconnecting'){
      role.textContent='reconnecting…'; role.style.color='rgba(255,255,255,0.55)';
    } else {
      role.textContent='opponent left'; role.style.color='rgba(255,255,255,0.40)';
    }
    updateBadgeTurn();
  }

  // ════════════════════════════════════════════════════════════
  // REACTION & PTT EVENTS
  // ════════════════════════════════════════════════════════════
  document.querySelectorAll('.react-btn[data-emoji]').forEach(btn => {
    btn.addEventListener('click', () => sendReaction(btn.dataset.emoji));
  });

  const pttBtn = document.getElementById('ptt-btn');
  function pttPress(e) {
    e.preventDefault();
    if (net.mode === 'local' || !localStream) return;
    setPttActive(true);
    sendNet({ type: 'ptt', on: true });
  }
  function pttRelease(e) {
    e.preventDefault();
    setPttActive(false);
    sendNet({ type: 'ptt', on: false });
  }
  pttBtn.addEventListener('mousedown',  pttPress);
  pttBtn.addEventListener('mouseup',    pttRelease);
  pttBtn.addEventListener('mouseleave', pttRelease);
  pttBtn.addEventListener('touchstart', pttPress,   { passive: false });
  pttBtn.addEventListener('touchend',   pttRelease, { passive: false });
  pttBtn.addEventListener('touchcancel',pttRelease, { passive: false });

  document.getElementById('chat-send-btn').addEventListener('click', sendChatMsg);
  (function () {
    const input   = document.getElementById('chat-text-input');
    const micBtn  = document.getElementById('ptt-btn');
    const sendBtn = document.getElementById('chat-send-btn');
    input.addEventListener('input', () => {
      const hasText = input.value.length > 0;
      micBtn.classList.toggle('hidden', hasText);
      sendBtn.classList.toggle('hidden', !hasText);
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); sendChatMsg(); }
    });
  })();

  // ════════════════════════════════════════════════════════════
  // LOBBY EVENTS
  // ════════════════════════════════════════════════════════════
  document.getElementById('btn-local').addEventListener('click',()=>{
    net.mode='local'; hideLobby(); updateDots();
  });
  document.getElementById('btn-create').addEventListener('click', () => createGame());
  document.getElementById('btn-join').addEventListener('click',()=>{
    showLS('ls-join');
    document.getElementById('join-error').classList.add('hidden');
    document.getElementById('code-input').value='';
    setTimeout(()=>document.getElementById('code-input').focus(),80);
  });
  document.getElementById('btn-connect').addEventListener('click', joinGame);
  document.getElementById('btn-cancel-create').addEventListener('click',()=>{
    sessionStorage.removeItem('ticto_host');
    destroyPeer(); net={mode:'local',peer:null,conn:null,myRole:null,code:null}; showLS('ls-home');
  });
  document.getElementById('btn-cancel-join').addEventListener('click',()=>{
    destroyPeer(); net={mode:'local',peer:null,conn:null,myRole:null,code:null}; showLS('ls-home');
  });
  document.getElementById('badge-leave').addEventListener('click', leaveOnlineGame);

  const codeInput=document.getElementById('code-input');
  codeInput.addEventListener('input',()=>{
    const v=codeInput.value.toUpperCase().replace(/[^A-Z]/g,'');
    if(codeInput.value!==v) codeInput.value=v;
  });
  codeInput.addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
  codeInput.addEventListener('animationend',()=>codeInput.classList.remove('shake'));

  document.getElementById('room-code-display').addEventListener('click',async()=>{
    if(!net.code) return;
    const link=`${location.origin}${location.pathname}?join=${net.code}`;
    try {
      await navigator.clipboard.writeText(link);
      const hint=document.getElementById('copy-hint');
      hint.textContent='link copied! ✓'; hint.classList.add('copied');
      clearTimeout(hint._t); hint._t=setTimeout(()=>{hint.textContent='tap to copy link';hint.classList.remove('copied');},2500);
    } catch(e){}
  });

  // Re-init host peer if app was suspended (no full reload) and peer died.
  // createGame() handles same-code retry + backoff, so we just delegate to it.
  document.addEventListener('visibilitychange', ()=>{
    if (document.visibilityState!=='visible') return;
    if (net.mode!=='host'||net.conn) return;
    if (net.peer&&!net.peer.destroyed&&!net.peer.disconnected) return;
    const code=net.code; if(!code) return;
    createGame(code);
  });

  // Restore host waiting state after a full page reload on mobile.
  // Only resumes if the session was saved within the last 3 minutes
  // (genuine app-switch). Older entries are cleared silently.
  (function checkHostResume() {
    const raw=sessionStorage.getItem('ticto_host');
    if (!raw) return;
    let saved; try { saved=JSON.parse(raw); } catch(e) { sessionStorage.removeItem('ticto_host'); return; }
    if (!saved.code||!saved.ts||Date.now()-saved.ts>3*60*1000) {
      sessionStorage.removeItem('ticto_host'); return;
    }
    const code=saved.code;
    function tryResume() {
      if (typeof Peer!=='undefined') { createGame(code); }
      else { setTimeout(tryResume,200); }
    }
    tryResume();
  })();

  // Auto-join if opened via shareable link (?join=XXXX)
  (function checkAutoJoin() {
    const code = new URLSearchParams(location.search).get('join');
    if (!code || !/^[A-Za-z]{4}$/.test(code)) return;
    history.replaceState(null, '', location.pathname);
    document.getElementById('code-input').value = code.toUpperCase();
    function tryJoin() {
      if (typeof Peer !== 'undefined') {
        showLS('ls-join');
        setTimeout(joinGame, 80);
      } else {
        setTimeout(tryJoin, 200);
      }
    }
    tryJoin();
  })();
  </script>
