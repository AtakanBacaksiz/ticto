<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TIC.TAC.TOE</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <script src="src/reconnect.js"></script>

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    :root { --x: #E8635A; --o: #5B9EF5; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #060810;
      background-image:
        radial-gradient(ellipse 55% 40% at 25% 50%, rgba(91,158,245,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 45% 40% at 75% 50%, rgba(232,99,90,0.09) 0%, transparent 70%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top,0px),30px) 20px max(env(safe-area-inset-bottom,0px),30px);
      font-family: 'Courier New', Courier, monospace;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 9999;
    }

    /* TURN DOTS */
    .turn-dot {
      width: 8px; height: 12px; border-radius: 2px; flex-shrink: 0;
      transition: opacity 160ms ease-out, box-shadow 160ms ease-out, transform 160ms ease-out;
    }
    .turn-dot.top    { background: var(--o); opacity: 0.18; }
    .turn-dot.bottom { background: var(--x); opacity: 0.18; }
    .turn-dot.top.active {
      opacity: 1;
      box-shadow: 0 0 6px var(--o), 0 0 14px rgba(91,158,245,0.50);
      animation: dotPulse 1.0s steps(1,end) infinite;
    }
    .turn-dot.bottom.active {
      opacity: 1;
      box-shadow: 0 0 6px var(--x), 0 0 14px rgba(232,99,90,0.50);
      animation: dotPulse 1.0s steps(1,end) infinite;
    }
    @keyframes dotPulse { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }

    /* GAME AREA */
    .game-area { display: flex; flex-direction: column; align-items: center; gap: 28px; }

    /* BOARD */
    .board { position: relative; width: min(88vw, calc(100dvh - 200px), 520px); aspect-ratio: 1; }
    .grid-svg, .win-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .cells { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }
    .cell {
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; border-radius: 2px; transition: background 80ms;
    }
    .cell:active:not(.filled) { background: rgba(255,255,255,0.05); }
    .cell.win-cell { animation: winCellFlash 0.45s ease-out forwards; }
    @keyframes winCellFlash { 0%{background:rgba(255,255,255,0.10)} 100%{background:rgba(255,255,255,0.02)} }

    /* SVG MARKS */
    .mark-svg { width: 74%; aspect-ratio: 1; overflow: visible; animation: markBounce 170ms cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes markBounce { 0%{transform:scale(0);opacity:0.6} 55%{transform:scale(1.16);opacity:1} 80%{transform:scale(0.96)} 100%{transform:scale(1)} }
    .mark-svg line, .result-symbol-svg line { stroke-linecap: square; stroke-linejoin: miter; }
    .mark-svg circle, .result-symbol-svg circle { fill: none; }
    .mark-svg.x { filter: none; }
    .mark-svg.o { filter: none; }
    .mark-svg.glow-x { filter: brightness(1.3) saturate(1.5); }
    .mark-svg.glow-o { filter: brightness(1.3) saturate(1.5); }
    @keyframes drawXLine  { to { stroke-dashoffset: 0; } }
    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    .mark-svg.mark-oldest { opacity: 0.26; filter: none !important; animation: markBounce 170ms cubic-bezier(0.34,1.56,0.64,1) forwards, oldestPulse 1.8s ease-in-out 0.17s infinite; }
    @keyframes oldestPulse { 0%,100%{opacity:0.20} 50%{opacity:0.38} }

    /* WIN LINE */
    .win-line {
      fill: none; stroke-linecap: square; stroke-width: 5;
      stroke-dasharray: 12 7; stroke-dashoffset: var(--dash-len,400);
      transition: stroke-dashoffset 330ms cubic-bezier(0.4,0,0.2,1);
    }
    .win-line.drawn { stroke-dashoffset: 0; }

    /* RESET BUTTON */
    .reset-btn {
      width: 40px; height: 40px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.14); background: transparent;
      color: rgba(255,255,255,0.20); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 80ms ease-out;
    }
    .reset-btn:hover { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.36); background: rgba(255,255,255,0.05); }
    .reset-btn:active { transform: scale(0.92) rotate(-30deg); }

    /* RESULT OVERLAY */
    .result-overlay {
      position: fixed; inset: 0; background: rgba(6,8,16,0.90);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 28px; z-index: 10;
      animation: overlayFadeIn 280ms ease-out;
    }
    .result-overlay.win-x { animation: overlayFlashX 320ms ease-out; }
    .result-overlay.win-o { animation: overlayFlashO 320ms ease-out; }
    @keyframes overlayFadeIn { from{opacity:0} to{opacity:1} }
    @keyframes overlayFlashX { 0%{opacity:0;background:rgba(232,99,90,0.28)} 40%{background:rgba(232,99,90,0.14)} 100%{opacity:1;background:rgba(6,8,16,0.90)} }
    @keyframes overlayFlashO { 0%{opacity:0;background:rgba(91,158,245,0.28)} 40%{background:rgba(91,158,245,0.14)} 100%{opacity:1;background:rgba(6,8,16,0.90)} }
    .overlay-ring {
      position: absolute; top: 50%; left: 50%; width: 80px; height: 80px;
      border-radius: 50%; border: 2px solid currentColor;
      transform: translate(-50%,-50%) scale(0.3); opacity: 0;
      pointer-events: none; animation: ringExpand 1.1s ease-out forwards;
    }
    @keyframes ringExpand { 0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.65} 60%{opacity:0.25} 100%{transform:translate(-50%,-50%) scale(6.5);opacity:0} }
    .result-symbol-svg {
      width: clamp(96px,40vw,172px); aspect-ratio: 1; overflow: visible;
      animation: symbolPop 360ms cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes symbolPop { 0%{transform:scale(0.18) rotate(-10deg);opacity:0} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    .result-symbol-svg.x { filter: none; }
    .result-symbol-svg.o { filter: none; }
    /* CONVERSATION PROMPT — floating card, shown separately after result overlay */
    .conv-prompt-overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      animation: convFadeIn 300ms ease-out both;
    }
    @keyframes convFadeIn { from{opacity:0} to{opacity:1} }
    .conv-prompt-card {
      background: rgba(8,10,20,0.96); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 4px; padding: 28px 26px;
      max-width: min(290px,78vw); text-align: center;
      font-size: clamp(15px,4.2vw,18px); font-weight: 400;
      color: rgba(255,255,255,0.82); line-height: 1.52; letter-spacing: 0.01em;
      box-shadow: 0 16px 56px rgba(0,0,0,0.65);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      animation: convCardPop 380ms cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes convCardPop    { from{transform:scale(0.82)} to{transform:scale(1)} }
    @keyframes convCardPopRot { from{transform:rotate(180deg) scale(0.82)} to{transform:rotate(180deg) scale(1)} }
    .conv-prompt-card.rotated { animation: convCardPopRot 380ms cubic-bezier(0.34,1.56,0.64,1) both; }
    .overlay-reset {
      width: 52px; height: 52px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.50); font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 80ms ease-out;
    }
    .overlay-reset:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.50); color: rgba(255,255,255,0.90); }
    .overlay-reset:active { transform: scale(0.92) rotate(-30deg); }
    .overlay-particle { position: absolute; top: 50%; left: 50%; border-radius: 50%; pointer-events: none; opacity: 0; }
    @keyframes overlayParticleFly {
      0%  { transform: translate(-50%,-50%) translate(0,0) scale(1.5); opacity: 0.9; }
      100%{ transform: translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
    }
    .particle { position: absolute; width: 5px; height: 5px; border-radius: 50%; pointer-events: none; animation: particleFly var(--dur,0.45s) ease-out forwards; }
    @keyframes particleFly { 0%{transform:translate(0,0) scale(1.2);opacity:0.85} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }

    /* ═══════════════════════════════════ SPIN WHEEL ══════ */
.wheel-overlay {
      position: fixed; inset: 0; background: rgba(6,8,16,0.96);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; z-index: 15; animation: overlayFadeIn 260ms ease-out;
    }
    .wheel-close-btn {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 40px;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.40); font-size: 20px; cursor: pointer; transition: all 80ms ease-out;
    }
    .wheel-close-btn:hover { color: rgba(255,255,255,0.80); border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.10); }
    .wheel-wrap {
      position: relative; width: clamp(220px,60vw,280px); height: clamp(220px,60vw,280px);
      display: flex; align-items: center; justify-content: center;
    }
    .wheel-ptr {
      position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent; border-right: 11px solid transparent;
      border-top: 20px solid rgba(255,255,255,0.88);
      z-index: 2; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.55));
    }
    .wheel-disk {
      width: 100%; height: 100%; border-radius: 50%;
      /* background set dynamically per wheel type */
      box-shadow: 0 0 0 4px rgba(255,255,255,0.10), 0 8px 40px rgba(0,0,0,0.55);
      transition: transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99);
      position: relative; overflow: hidden;
      will-change: transform;
    }
    .wheel-disk::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: repeating-conic-gradient(rgba(0,0,0,0.18) 0deg 1.5deg, transparent 1.5deg 45deg);
    }
    .wheel-hub {
      position: absolute; width: 48px; height: 48px; border-radius: 50%;
      background: #060810; border: 3px solid rgba(255,255,255,0.18); z-index: 2;
    }
    /* Choice screens (role / dare-truth) */
    .wheel-choice-title {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); text-align: center;
    }
    .wheel-choice-btn {
      width: min(280px,82vw); padding: 20px 24px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05);
      cursor: pointer; text-align: center; transition: all 80ms ease-out;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .wheel-choice-btn:hover  { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.35); }
    .wheel-choice-btn:active { transform: scale(0.97); }
    .wheel-choice-emoji { font-size: 30px; line-height: 1; }
    .wheel-choice-label { font-size: 15px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(255,255,255,0.82); }
    .wheel-choice-sub   { font-size: 12px; color: rgba(255,255,255,0.38); }
    .wheel-type-label   { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; }
    .wheel-spin-btn {
      padding: 13px 38px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85); font-size: 15px; font-family: inherit;
      cursor: pointer; transition: all 80ms ease-out;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .wheel-spin-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.50); }
    .wheel-spin-btn:active:not(:disabled) { transform: scale(0.95); }
    .wheel-spin-btn:disabled { opacity: 0.28; cursor: default; }
    /* Result card — straight by default; add --rotated for loser's offline result */
    .wheel-result-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(6,8,16,0.88); z-index: 3;
      animation: overlayFadeIn 220ms ease-out;
    }
    .wheel-result-card {
      background: rgba(8,10,22,0.98); border-radius: 4px; padding: 32px 28px 26px;
      max-width: min(300px,82vw); text-align: center;
      border: 1.5px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 64px rgba(0,0,0,0.75);
      animation: wheelCardPopStraight 400ms cubic-bezier(0.34,1.56,0.64,1) both;
      will-change: transform, opacity;
    }
    @keyframes wheelCardPopStraight {
      from { transform: scale(0.65); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .wheel-result-card--rotated {
      transform: rotate(180deg);
      animation: wheelCardPop 400ms cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes wheelCardPop {
      from { transform: rotate(180deg) scale(0.65); opacity: 0; }
      to   { transform: rotate(180deg) scale(1);    opacity: 1; }
    }
    .wheel-result-emoji { font-size: 42px; margin-bottom: 10px; line-height: 1; }
    .wheel-result-text {
      font-size: clamp(15px,4.2vw,18px); color: rgba(255,255,255,0.85);
      line-height: 1.55; margin-bottom: 22px;
    }
    .wheel-result-ok {
      display: inline-block; padding: 9px 26px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.70); font-size: 13px; font-family: inherit;
      cursor: pointer; transition: all 80ms ease-out; letter-spacing: 0.06em;
    }
    .wheel-result-ok:hover { background: rgba(255,255,255,0.16); }

    /* ═══════════════════════════════════════════ LOBBY ══════ */
    .lobby-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: #060810;
      background-image:
        radial-gradient(ellipse 60% 55% at 28% 42%, rgba(91,158,245,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 55% 55% at 72% 60%, rgba(232,99,90,0.09) 0%, transparent 65%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 320ms ease;
    }
    .lobby-overlay.hidden { display: none; }
    .ls { display: flex; flex-direction: column; align-items: center; width: min(290px,88vw); }
    .ls.hidden { display: none; }
    .lobby-logo { font-size: clamp(80px,24vw,116px); font-weight: 800; letter-spacing: -0.04em; color: white; line-height: 1; margin-bottom: 6px; }
    .lobby-logo span { color: var(--x); }
    .lobby-tagline { font-size: clamp(10px,2.8vw,13px); color: rgba(255,255,255,0.25); letter-spacing: 0.20em; text-transform: uppercase; margin-bottom: 48px; }
    .lobby-actions { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 100%; }
    .lbtn {
      padding: 13px 24px; border-radius: 3px;
      border: 1.5px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.72); font-size: 15px; font-weight: 500; font-family: inherit;
      cursor: pointer; letter-spacing: 0.04em; transition: all 80ms ease-out;
    }
    .lbtn:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.26); color: white; }
    .lbtn:active { transform: scale(0.97); }
    .lbtn.primary { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.32); color: white; font-weight: 600; }
    .lbtn.primary:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.52); }
    .lbtn-divider {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); display: flex; align-items: center; gap: 10px; margin: 8px 0 2px;
    }
    .lbtn-divider::before, .lbtn-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .lbtn-text {
      background: none; border: none; color: rgba(255,255,255,0.28); font-size: 13px;
      font-family: inherit; cursor: pointer; padding: 10px; letter-spacing: 0.02em; transition: color 140ms;
    }
    .lbtn-text:hover { color: rgba(255,255,255,0.60); }
    .lobby-err { font-size: 12px; color: rgba(232,99,90,0.75); text-align: center; max-width: 220px; min-height: 16px; margin-top: 8px; }
    .lobby-err.hidden { visibility: hidden; }
    .lobby-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 18px; }
    .room-code {
      font-size: clamp(56px,18vw,96px); font-weight: 800; letter-spacing: 0.22em;
      color: white; padding: 14px 22px; border-radius: 18px;
      border: 1.5px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.04);
      cursor: pointer; transition: background 140ms; margin-bottom: 10px;
    }
    .room-code:hover { background: rgba(255,255,255,0.09); }
    .room-code:active { background: rgba(255,255,255,0.14); }
    .copy-hint { font-size: 10px; color: rgba(255,255,255,0.22); letter-spacing: 0.10em; text-transform: uppercase; transition: color 200ms; margin-bottom: 28px; }
    .copy-hint.copied { color: rgba(91,158,245,0.70); }
    .lobby-spinner { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.10); border-top-color: rgba(255,255,255,0.55); border-radius: 50%; animation: spin 0.75s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .lobby-hint { font-size: 14px; color: rgba(255,255,255,0.32); text-align: center; max-width: 190px; margin-bottom: 28px; line-height: 1.5; }
    .code-input {
      width: 100%; padding: 16px 18px; border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.05);
      color: white; font-size: 30px; font-weight: 700;
      font-family: ui-monospace, 'Courier New', monospace;
      text-align: center; letter-spacing: 0.30em; outline: none;
      text-transform: uppercase; caret-color: var(--o);
      transition: border-color 150ms; margin-bottom: 10px;
    }
    .code-input:focus { border-color: rgba(91,158,245,0.50); }
    .code-input::placeholder { color: rgba(255,255,255,0.14); }
    @keyframes inputShake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-8px)} 36%{transform:translateX(8px)} 54%{transform:translateX(-5px)} 72%{transform:translateX(5px)} }
    .shake { animation: inputShake 0.35s ease; }
    .join-error { font-size: 12px; color: rgba(232,99,90,0.75); margin-bottom: 12px; margin-top: -2px; min-height: 16px; }
    .join-error.hidden { visibility: hidden; }

    /* ═══════════════════════════════════════ ONLINE BADGE ═══ */
    .online-badge {
      position: fixed; top: max(env(safe-area-inset-top,0px),14px); right: 16px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 3px; padding: 5px 10px 5px 9px;
      z-index: 20; white-space: nowrap; font-size: 11px;
      letter-spacing: 0.03em; color: rgba(255,255,255,0.45);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .online-badge.hidden { display: none; }
    .badge-conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.20); transition: background 300ms, box-shadow 300ms; }
    .badge-conn-dot.connected { background: #4ADE80; box-shadow: 0 0 5px rgba(74,222,128,0.55); }
    .badge-conn-dot.disconnected { background: var(--x); }
    .badge-conn-dot.reconnecting { background: #FACC15; box-shadow: 0 0 5px rgba(250,204,21,0.6); animation: reconnBlink 0.9s ease-in-out infinite; }
    @keyframes reconnBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #badge-role { font-weight: 600; letter-spacing: 0.02em; }
    .badge-sep { color: rgba(255,255,255,0.18); font-size: 10px; }
    #badge-turn { font-size: 10px; color: rgba(255,255,255,0.35); }
    .badge-leave { background: none; border: none; color: rgba(255,255,255,0.22); font-size: 11px; font-family: inherit; cursor: pointer; padding: 1px 0 1px 4px; letter-spacing: 0.03em; transition: color 140ms; }
    .badge-leave:hover { color: rgba(255,255,255,0.60); }

    /* SCORE BAR */
    .score-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: min(88vw, calc(100dvh - 200px), 520px);
      padding: 0 4px;
    }
    .score-side { display: flex; align-items: center; gap: 8px; }
    .score-side-right { flex-direction: row-reverse; }
    .score-player {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .o-player { color: var(--o); opacity: 0.80; }
    .x-player { color: var(--x); opacity: 0.80; }
    .sc-n {
      font-size: 22px; font-weight: 700; min-width: 24px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .sc-n.o-val { color: var(--o); opacity: 0.85; }
    .sc-n.x-val { color: var(--x); opacity: 0.85; }
    .sc-n.just-bumped { animation: scBump 340ms cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes scBump { 0%{transform:scale(1)} 35%{transform:scale(1.6)} 100%{transform:scale(1)} }
    .score-rounds {
      font-size: 13px; font-weight: 600; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.22); font-variant-numeric: tabular-nums;
    }

    /* REACTION BAR */
    .reaction-bar {
      display: flex; gap: 7px; align-items: center; justify-content: center;
    }
    .reaction-bar.hidden { display: none; }
    .react-btn {
      font-size: 20px; width: 38px; height: 38px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.04);
      cursor: pointer; transition: transform 110ms ease-out, background 110ms;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .react-btn:hover { background: rgba(255,255,255,0.10); }
    .react-btn:active { transform: scale(0.82); }

    /* FLOATING REACTION */
    .floating-reaction {
      position: fixed; left: 50%; top: 42%;
      font-size: 62px; line-height: 1; pointer-events: none; z-index: 200;
      animation: reactFloat 1.5s ease-out forwards;
    }
    @keyframes reactFloat {
      0%   { transform: translate(-50%, 0)     scale(0.35); opacity: 0; }
      16%  { transform: translate(-50%, -18px) scale(1.32); opacity: 1; }
      48%  { opacity: 0.88; }
      100% { transform: translate(-50%, -110px) scale(0.75); opacity: 0; }
    }

    /* CHAT LOG */
    .chat-log {
      width: min(88vw, calc(100dvh - 200px), 520px);
      max-height: 96px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;
      scrollbar-width: none;
    }
    .chat-log::-webkit-scrollbar { display: none; }
    .chat-log.hidden { display: none; }
    .chat-msg {
      font-size: 11px; letter-spacing: 0.04em; line-height: 1.4;
      padding: 5px 10px; border-radius: 3px; max-width: 78%; word-break: break-word;
    }
    .chat-msg.mine {
      align-self: flex-end; background: rgba(91,158,245,0.14);
      color: rgba(255,255,255,0.75); border: 1px solid rgba(91,158,245,0.20);
    }
    .chat-msg.theirs {
      align-self: flex-start; background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.60); border: 1px solid rgba(255,255,255,0.10);
    }

    /* VOICE + TEXT CHAT */
    .chat-input-row {
      display: flex; flex-direction: column; align-items: stretch; gap: 5px;
      width: min(88vw, calc(100dvh - 200px), 520px);
    }
    .chat-input-row.hidden { display: none; }
    .chat-field {
      display: flex; align-items: stretch;
      border: 1px solid rgba(255,255,255,0.14); border-radius: 3px;
      background: rgba(255,255,255,0.05); overflow: hidden;
      transition: border-color 100ms;
    }
    .chat-field:focus-within { border-color: rgba(255,255,255,0.30); }
    .chat-text-input {
      flex: 1; height: 34px; padding: 0 10px;
      border: none; background: transparent;
      color: rgba(255,255,255,0.80); font-size: 12px; font-family: inherit;
      outline: none; letter-spacing: 0.04em;
    }
    .chat-text-input::placeholder { color: rgba(255,255,255,0.22); }
    .chat-icon-btn {
      width: 34px; flex-shrink: 0;
      border: none; border-left: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      color: rgba(255,255,255,0.38); font-size: 16px; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 80ms, color 80ms;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .chat-icon-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.70); }
    .chat-icon-btn.hidden { display: none; }
    .chat-mic-btn.active {
      background: rgba(74,222,128,0.10); color: rgba(74,222,128,0.92);
      animation: pttPulse 0.75s ease-in-out infinite;
    }
    .ptt-hint {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); transition: color 150ms; text-align: center;
    }
    .ptt-hint.them { color: rgba(91,158,245,0.65); animation: pttThemBlink 0.55s steps(1) infinite; }
    @keyframes pttThemBlink { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }
    @keyframes pttPulse { 0%,100%{box-shadow:0 0 8px rgba(74,222,128,0.18)} 50%{box-shadow:0 0 20px rgba(74,222,128,0.42)} }

    /* SERIES BANNER (inside result overlay) */
    .series-banner {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      animation: symbolPop 360ms cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .series-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .series-score { font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 0.08em; font-variant-numeric: tabular-nums; }
    .series-winner-txt { font-size: 14px; letter-spacing: 0.06em; color: rgba(255,255,255,0.60); }
  </style>
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby" class="lobby-overlay">

    <div id="ls-home" class="ls">
      <div class="lobby-logo">tic<span>.</span></div>
      <div class="lobby-tagline">for strangers</div>

    <div id="ls-connecting" class="ls hidden">

    </div>

  </div>

  <!-- ONLINE BADGE -->
  <div id="online-badge" class="online-badge hidden">
    <span id="badge-conn-dot" class="badge-conn-dot"></span>
    <span id="badge-role"></span>
    <span class="badge-sep">·</span>
    <span id="badge-turn"></span>

  </div>

  <!-- GAME -->
  <div class="turn-dot top" id="dot-o"></div>

  <div class="game-area">
    <div class="board" id="board">
      <svg class="grid-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="16" y1="100" x2="284" y2="100" stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="square" stroke-dasharray="8 5"/>
        <line x1="16" y1="200" x2="284" y2="200" stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="square" stroke-dasharray="8 5"/>
        <line x1="100" y1="16" x2="100" y2="284" stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="square" stroke-dasharray="8 5"/>
        <line x1="200" y1="16" x2="200" y2="284" stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="square" stroke-dasharray="8 5"/>
      </svg>
      <svg class="win-svg" id="win-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line class="win-line" id="win-line" x1="0" y1="0" x2="0" y2="0"/>
      </svg>
      <div class="cells" id="cells">
        <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
      </div>
    </div>
    <button class="reset-btn" id="reset-btn" aria-label="New game">↺</button>
    <div class="score-bar" id="score-bar">
      <div class="score-side">
        <span class="score-player o-player">[O]</span>
        <span class="sc-n o-val" id="sc-o-w">0</span>
      </div>
      <span class="score-rounds" id="score-rounds">0:0</span>
      <div class="score-side score-side-right">
        <span class="sc-n x-val" id="sc-x-w">0</span>
        <span class="score-player x-player">[X]</span>
      </div>
    </div>
    <!-- REACTION BAR (online only) -->
    <div class="reaction-bar hidden" id="reaction-bar">
      <button class="react-btn" data-emoji="👏" aria-label="Clap">👏</button>
      <button class="react-btn" data-emoji="🔥" aria-label="Fire">🔥</button>
      <button class="react-btn" data-emoji="😅" aria-label="Sweat">😅</button>
      <button class="react-btn" data-emoji="🎉" aria-label="Party">🎉</button>
      <button class="react-btn" data-emoji="😤" aria-label="Grr">😤</button>
      <button class="react-btn" data-emoji="💀" aria-label="Skull">💀</button>
    </div>
    <!-- CHAT LOG (online only) -->
    <div class="chat-log hidden" id="chat-log"></div>
    <!-- VOICE + TEXT CHAT (online only) -->
    <div class="chat-input-row hidden" id="chat-input-row">
      <div class="chat-field">
        <input class="chat-text-input" id="chat-text-input" type="text"
          placeholder="message…" maxlength="200"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="chat-icon-btn chat-mic-btn" id="ptt-btn" aria-label="Hold to talk">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4.25" y="0.75" width="5.5" height="8" rx="2.75" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1.5 7.5C1.5 10.8 12.5 10.8 12.5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="11" x2="7" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4.5" y1="14.5" x2="9.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="chat-icon-btn chat-send-btn hidden" id="chat-send-btn" aria-label="Send">↑</button>
      </div>
      <span class="ptt-hint" id="ptt-hint">hold to talk</span>
    </div>
    <audio id="remote-audio" autoplay playsinline style="display:none"></audio>
  </div>

  <div class="turn-dot bottom" id="dot-x"></div>

  <script>
  // ════════════════════════════════════════════════════════════
  // CONSTANTS
  // ════════════════════════════════════════════════════════════
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const WIN_COORDS = [
    {x1:14,y1:50,x2:286,y2:50},{x1:14,y1:150,x2:286,y2:150},{x1:14,y1:250,x2:286,y2:250},
    {x1:50,y1:14,x2:50,y2:286},{x1:150,y1:14,x2:150,y2:286},{x1:250,y1:14,x2:250,y2:286},
    {x1:22,y1:22,x2:278,y2:278},{x1:278,y1:22,x2:22,y2:278},
  ];
  const DIAG_LEN    = Math.round(Math.sqrt(256*256+256*256));
  const WIN_LENGTHS = [272,272,272,272,272,272,DIAG_LEN,DIAG_LEN];
  const CODE_CHARS    = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // 24 chars, no I/O
  const ROUND_GAMES = 3; // number of games per round

  // ════════════════════════════════════════════════════════════
  // CONVERSATION STARTER POOLS
  // Always shown to the OPPONENT (never the creator).
  // WIN  = creator won  →  opponent sees these
  // DRAW = draw         →  opponent sees these
  // LOSE = creator lost →  opponent sees these
  // ════════════════════════════════════════════════════════════
  const CONV_WIN = [
    "What made you try this game 🙂",
    "Are you usually this calm 👀",
    "Do you play often 😄",
    "Was that planned or instinct 🤔",
    "What is your secret strategy 🧠",
    "Do you prefer thinking or reacting",
    "Was that lucky timing 😅",
    "Are you competitive normally",
    "What kind of games do you like 🎮",
    "Was that your serious face 😌",
  ];
  const CONV_DRAW = [
    "Coffee or tea person ☕",
    "Morning energy or night owl 🌙",
    "Music while working 🎵",
    "City walks or quiet cafés 🚶",
    "Books or podcasts 📚",
    "Spontaneous or planner 🤔",
    "Sweet or salty 🍫",
    "Beach or mountains 🌊",
    "Early bird or last minute 😄",
    "Favorite way to relax 🌿",
  ];
  const CONV_LOSE = [
    "You seem focused — always like that 😉",
    "What do you do when you win 😄",
    "Should I be nervous 👀",
    "You look competitive",
    "That confidence is natural 😌",
    "Do you always stay this calm",
    "I feel like you planned that",
    "Are you secretly practicing",
    "I did not expect that move",
    "Are you this strategic in real life",
  ];

  // ════════════════════════════════════════════════════════════
  // NET STATE — declared early so updateBadgeTurn() can read it
  // ════════════════════════════════════════════════════════════
  let net = { mode:'local', peer:null, conn:null, myRole:null, code:null, reconnecting:false };
  let convPromptTimer = null; // pending conversation-prompt timeout (cleared on restart)
  let wheelRot = 0;           // cumulative spin-wheel rotation (degrees)

  // ════════════════════════════════════════════════════════════
  // CONVERSATION PROMPT HELPERS
  // ════════════════════════════════════════════════════════════
  // result   : 'X' | 'O' | 'D'
  // isCreator: true  → host/X in online, or X in local; returns null (no prompt shown)
  // isCreator: false → opponent; returns a random question from the correct pool
  function getConversationPrompt(result, isCreator) {
    if (isCreator) return null;
    const pool = result === 'D' ? CONV_DRAW
               : result === 'X' ? CONV_WIN   // creator (X) won  → opponent reads WIN
               : CONV_LOSE;                  // creator (X) lost → opponent reads LOSE
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // Mounts a separate floating card over everything.
  // Auto-dismisses after 5 s; tap anywhere dismisses immediately.
  // Pass rotated=true in local (pass & play) mode so O player can read it right-side-up.
  function showConversationPrompt(message, rotated) {
    const stale = document.querySelector('.conv-prompt-overlay');
    if (stale) stale.remove();

    const overlay = document.createElement('div');
    overlay.className = 'conv-prompt-overlay';

    const card = document.createElement('div');
    card.className = 'conv-prompt-card' + (rotated ? ' rotated' : '');
    card.textContent = message;
    overlay.appendChild(card);

    function dismiss() {
      clearTimeout(selfTimer);
      overlay.style.transition = 'opacity 300ms ease-out';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 320);
    }
    const selfTimer = setTimeout(dismiss, 5000);
    overlay.addEventListener('click', dismiss, { once: true });
    document.body.appendChild(overlay);
  }

  // ════════════════════════════════════════════════════════════
  // AUDIO
  // ════════════════════════════════════════════════════════════
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
  }
  function sfxTap(player) {
    try {
      const ctx=getAudioCtx(), t=ctx.currentTime;
      // Main chip tone — square wave chirp
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination); osc.type='square';
      if (player==='X') {
        osc.frequency.setValueAtTime(440,t);
        osc.frequency.exponentialRampToValueAtTime(880,t+0.04);
      } else {
        osc.frequency.setValueAtTime(660,t);
        osc.frequency.exponentialRampToValueAtTime(330,t+0.04);
      }
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.18,t+0.004);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.075);
      osc.start(t); osc.stop(t+0.08);
      // Brief sawtooth thud for texture
      const osc2=ctx.createOscillator(), g2=ctx.createGain();
      osc2.connect(g2); g2.connect(ctx.destination); osc2.type='sawtooth';
      osc2.frequency.setValueAtTime(player==='X'?120:90,t);
      g2.gain.setValueAtTime(0.0001,t); g2.gain.linearRampToValueAtTime(0.10,t+0.003);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.05);
      osc2.start(t); osc2.stop(t+0.06);
    } catch(e){}
  }
  function sfxWin(winner) {
    try {
      const ctx=getAudioCtx();
      const notes=winner==='X'?[523,659,784,1047]:[440,554,659,880];
      // Staccato ascending chip arpeggio
      notes.forEach((freq,i)=>{
        const t=ctx.currentTime+i*0.13;
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type='square';
        osc.frequency.setValueAtTime(freq,t);
        g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.12,t+0.005);
        g.gain.setValueAtTime(0.12,t+0.07); g.gain.exponentialRampToValueAtTime(0.001,t+0.10);
        osc.start(t); osc.stop(t+0.11);
      });
      // Final triumphant chord (root + fifth)
      const tChord=ctx.currentTime+notes.length*0.13+0.04;
      (winner==='X'?[523,784]:[440,659]).forEach(freq=>{
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type='square';
        osc.frequency.setValueAtTime(freq,tChord);
        g.gain.setValueAtTime(0.0001,tChord); g.gain.linearRampToValueAtTime(0.09,tChord+0.006);
        g.gain.setValueAtTime(0.09,tChord+0.12); g.gain.exponentialRampToValueAtTime(0.001,tChord+0.22);
        osc.start(tChord); osc.stop(tChord+0.24);
      });
    } catch(e){}
  }
  function sfxDraw() {
    try {
      const ctx=getAudioCtx();
      // Descending two-tone "wah-wah" — classic chip game-over sound
      [{f:440,d:0},{f:370,d:0.18}].forEach(({f,d})=>{
        const t=ctx.currentTime+d;
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type='square';
        osc.frequency.setValueAtTime(f,t);
        osc.frequency.exponentialRampToValueAtTime(f*0.84,t+0.14);
        g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.10,t+0.006);
        g.gain.setValueAtTime(0.10,t+0.10); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
        osc.start(t); osc.stop(t+0.24);
      });
    } catch(e){}
  }
  function vibrate(p) { try{navigator.vibrate&&navigator.vibrate(p)}catch(e){} }

  // ════════════════════════════════════════════════════════════
  // GAME STATE & DOM
  // ════════════════════════════════════════════════════════════
  let G = { board:Array(9).fill(null), turn:'X', scores:{X:0,O:0}, rounds:{X:0,O:0}, over:false, winner:null, winIdx:-1, placementOrder:[] };

  const dotX    = document.getElementById('dot-x');
  const dotO    = document.getElementById('dot-o');
  const boardEl = document.getElementById('board');
  const cellEls = Array.from(document.querySelectorAll('.cell'));
  const winLine = document.getElementById('win-line');
  const winSvg  = document.getElementById('win-svg');
  const resetBtn= document.getElementById('reset-btn');
  const css     = getComputedStyle(document.documentElement);
  const colorX  = () => css.getPropertyValue('--x').trim();
  const colorO  = () => css.getPropertyValue('--o').trim();

  // ════════════════════════════════════════════════════════════
  // GAME LOGIC
  // ════════════════════════════════════════════════════════════
  function checkWin(board) {
    for (let i=0;i<WINS.length;i++) {
      const [a,b,c]=WINS[i];
      if (board[a]&&board[a]===board[b]&&board[a]===board[c]) return {winner:board[a],idx:i};
    }
    return null;
  }

  function move(idx, fromNet=false) {
    if (G.over||G.board[idx]) return;
    if (net.mode!=='local'&&!fromNet&&G.turn!==net.myRole) return;

    clearOldestMarker();
    G.board[idx]=G.turn;
    G.placementOrder.push(idx);
    sfxTap(G.turn); vibrate(14);
    placeMark(idx,G.turn);
    fireParticles(idx,G.turn);

    if (net.mode!=='local'&&!fromNet) sendNet({type:'move',idx});

    // Check win BEFORE evicting the oldest piece
    const result=checkWin(G.board);
    if (result) {
      G.over=true; G.winner=result.winner; G.winIdx=result.idx;
      G.scores[result.winner]++;
      updateScoreBar();
      dotX.classList.remove('active'); dotO.classList.remove('active');
      updateBadgeTurn();
      setTimeout(()=>{ highlightWinCells(WINS[result.idx],result.winner); drawWinLine(result.idx,result.winner); },180);
      setTimeout(()=>{ sfxWin(result.winner); vibrate([30,40,80,40,140]); showOverlay(result.winner); },620);
    } else {
      // Sliding window: if 7th piece placed, evict the oldest
      if (G.placementOrder.length > 6) {
        const oldIdx=G.placementOrder.shift();
        G.board[oldIdx]=null;
        removeMarkAnimated(oldIdx);
      }
      updateOldestMarker();
      G.turn=G.turn==='X'?'O':'X';
      updateDots();
    }
  }

  function createMarkSVG(player, large=false) {
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 100 100');
    const cls=player==='D'?'draw':player.toLowerCase();
    svg.classList.add(large?'result-symbol-svg':'mark-svg',cls);

    // Two-layer stroke: outer (thick, dim) + inner (thin, bright) for neon-core inner glow
    function makeLine(x1,y1,x2,y2,outerCol,innerCol,dash,fullLen,animDelay) {
      // Outer thick stroke
      const lo=document.createElementNS(ns,'line');
      lo.setAttribute('x1',x1);lo.setAttribute('y1',y1);lo.setAttribute('x2',x2);lo.setAttribute('y2',y2);
      lo.setAttribute('stroke-dasharray',dash);lo.setAttribute('stroke-linecap','square');
      lo.style.stroke=outerCol; lo.style.strokeWidth='8px';
      if(large){lo.style.strokeDashoffset=fullLen;lo.style.animation=`drawXLine 0.28s ease-out ${animDelay}s forwards`;}
      // Inner bright highlight stroke
      const li=document.createElementNS(ns,'line');
      li.setAttribute('x1',x1);li.setAttribute('y1',y1);li.setAttribute('x2',x2);li.setAttribute('y2',y2);
      li.setAttribute('stroke-dasharray',dash);li.setAttribute('stroke-linecap','square');
      li.style.stroke=innerCol; li.style.strokeWidth='3px';
      if(large){li.style.strokeDashoffset=fullLen;li.style.animation=`drawXLine 0.28s ease-out ${animDelay}s forwards`;}
      svg.appendChild(lo); svg.appendChild(li);
    }
    function makeCircle(outerCol,innerCol,dash,fullLen) {
      // Outer thick stroke
      const co=document.createElementNS(ns,'circle');
      co.setAttribute('cx','50');co.setAttribute('cy','50');co.setAttribute('r','34');
      co.setAttribute('fill','none');co.setAttribute('stroke-dasharray',dash);
      co.style.stroke=outerCol; co.style.strokeWidth='8px';
      if(large){co.style.strokeDashoffset=fullLen;co.style.animation='drawCircle 0.52s cubic-bezier(0.4,0,0.2,1) 0.08s forwards';}
      // Inner bright highlight stroke
      const ci=document.createElementNS(ns,'circle');
      ci.setAttribute('cx','50');ci.setAttribute('cy','50');ci.setAttribute('r','34');
      ci.setAttribute('fill','none');ci.setAttribute('stroke-dasharray',dash);
      ci.style.stroke=innerCol; ci.style.strokeWidth='3px';
      if(large){ci.style.strokeDashoffset=fullLen;ci.style.animation='drawCircle 0.52s cubic-bezier(0.4,0,0.2,1) 0.08s forwards';}
      svg.appendChild(co); svg.appendChild(ci);
    }

    if (player==='X') {
      const outerCol='rgba(232,99,90,0.75)', innerCol='rgba(255,210,208,0.95)', dash='6 4', len=88;
      [['19','19','81','81'],['81','19','19','81']].forEach(([x1,y1,x2,y2],i)=>{
        makeLine(x1,y1,x2,y2,outerCol,innerCol,dash,len,i*0.22+0.08);
      });
    } else if (player==='O') {
      makeCircle('rgba(91,158,245,0.75)','rgba(200,225,255,0.95)','10 6',214);
    } else {
      const outerCol='rgba(255,255,255,0.20)', innerCol='rgba(255,255,255,0.55)', dash='6 4', len=64;
      [['18','38','82','38'],['18','62','82','62']].forEach(([x1,y1,x2,y2])=>{
        makeLine(x1,y1,x2,y2,outerCol,innerCol,dash,len,0.08);
      });
    }
    return svg;
  }

  function placeMark(idx,player) {
    const cell=cellEls[idx]; cell.classList.add('filled'); cell.appendChild(createMarkSVG(player));
  }

  function clearOldestMarker() {
    document.querySelectorAll('.mark-oldest').forEach(m=>m.classList.remove('mark-oldest'));
  }
  function updateOldestMarker() {
    clearOldestMarker();
    if (G.placementOrder.length === 6 && !G.over) {
      const mark = cellEls[G.placementOrder[0]]?.querySelector('.mark-svg');
      if (mark) mark.classList.add('mark-oldest');
    }
  }
  function removeMarkAnimated(idx) {
    const cell=cellEls[idx];
    const mark=cell.querySelector('.mark-svg');
    if (mark) {
      mark.style.transition='transform 200ms ease-in, opacity 200ms ease-in';
      mark.style.transform='scale(0)';
      mark.style.opacity='0';
      setTimeout(()=>{ cell.classList.remove('filled','win-cell'); cell.innerHTML=''; }, 220);
    } else {
      cell.classList.remove('filled','win-cell'); cell.innerHTML='';
    }
  }

  function highlightWinCells(combo,winner) {
    combo.forEach(i=>{
      cellEls[i].classList.add('win-cell');
      const m=cellEls[i].querySelector('.mark-svg');
      if (m) m.classList.add(`glow-${winner.toLowerCase()}`);
    });
  }

  function drawWinLine(winIdx,winner) {
    const c=WIN_COORDS[winIdx], len=WIN_LENGTHS[winIdx];
    const color=winner==='X'?colorX():colorO();
    winLine.setAttribute('x1',c.x1);winLine.setAttribute('y1',c.y1);
    winLine.setAttribute('x2',c.x2);winLine.setAttribute('y2',c.y2);
    winLine.setAttribute('stroke',color);
    winLine.style.setProperty('--dash-len',len);
    winLine.style.strokeDasharray='12 7'; winLine.style.strokeDashoffset=len;
    winSvg.style.filter='';
    requestAnimationFrame(()=>requestAnimationFrame(()=>winLine.classList.add('drawn')));
  }

  function fireParticles(idx,player) {
    const bRect=boardEl.getBoundingClientRect(), cRect=cellEls[idx].getBoundingClientRect();
    const cx=cRect.left-bRect.left+cRect.width/2, cy=cRect.top-bRect.top+cRect.height/2;
    const color=player==='X'?colorX():colorO();
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI*2, dist=24+Math.random()*20;
      const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist, dur=0.30+Math.random()*0.18;
      const p=document.createElement('div'); p.className='particle';
      p.style.cssText=`left:${cx}px;top:${cy}px;background:${color};box-shadow:0 0 4px ${color};--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;`;
      boardEl.appendChild(p); setTimeout(()=>p.remove(),(dur+0.05)*1000);
    }
  }

  function createBurstParticles(overlay,color) {
    const N=18;
    for(let i=0;i<N;i++){
      const angle=(i/N)*Math.PI*2+(Math.random()-0.5)*0.4, dist=85+Math.random()*90;
      const size=5+Math.random()*7, dur=0.45+Math.random()*0.35, delay=Math.random()*0.06;
      const p=document.createElement('div'); p.className='overlay-particle';
      p.style.cssText=`width:${size}px;height:${size}px;background:${color};box-shadow:0 0 7px ${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation:overlayParticleFly ${dur}s ease-out ${delay}s forwards;`;
      overlay.appendChild(p); setTimeout(()=>p.remove(),(dur+delay+0.1)*1000);
    }
  }

  function showOverlay(winner) {
    const ex=document.querySelector('.result-overlay'); if(ex) ex.remove();
    const overlay=document.createElement('div');
    const isDraw=winner==='D';
    const color=winner==='X'?colorX():winner==='O'?colorO():'rgba(255,255,255,0.35)';
    overlay.className='result-overlay';
    if(!isDraw) overlay.classList.add(`win-${winner.toLowerCase()}`);
    if(!isDraw) {
      for(let i=0;i<3;i++){
        const ring=document.createElement('div'); ring.className='overlay-ring';
        ring.style.color=color; ring.style.animationDelay=`${i*90}ms`; overlay.appendChild(ring);
      }
    }
    overlay.appendChild(createMarkSVG(isDraw?'D':winner,true));
    const roundGames = G.scores.X + G.scores.O;
    const roundOver = roundGames >= ROUND_GAMES;
    if (roundOver) {
      clearTimeout(convPromptTimer);
      const banner = document.createElement('div');
      banner.className = 'series-banner';
      const winLabel = document.createElement('span');
      winLabel.className = 'series-winner-txt';
      const scoreLabel = document.createElement('span');
      scoreLabel.className = 'series-score';
      if (G.scores.X > G.scores.O) {
        winLabel.textContent = 'X wins the round';
        scoreLabel.textContent = G.scores.X + ' – ' + G.scores.O;
      } else if (G.scores.O > G.scores.X) {
        winLabel.textContent = 'O wins the round';
        scoreLabel.textContent = G.scores.O + ' – ' + G.scores.X;
      } else {
        winLabel.textContent = 'round tied';
        scoreLabel.textContent = G.scores.X + ' – ' + G.scores.O;
      }
      banner.appendChild(winLabel);
      banner.appendChild(scoreLabel);
      overlay.appendChild(banner);
    } else {
      // In local play X = creator; in online the host (myRole==='X') = creator.
      const isCreator = net.mode === 'local' ? false : net.myRole === 'X';
      const convMsg = getConversationPrompt(winner, isCreator);
      // Show conversation prompt as a separate overlay AFTER the result animation settles.
      if (convMsg) {
        clearTimeout(convPromptTimer);
        convPromptTimer = setTimeout(() => showConversationPrompt(convMsg, false), 820);
      }
    }
    const btn=document.createElement('div'); btn.className='overlay-reset'; btn.textContent='↺';
    btn.setAttribute('role','button'); btn.setAttribute('aria-label', roundOver ? 'Next round' : 'Play again');
    btn.addEventListener('click', () => roundOver ? endRound() : restart());
    overlay.appendChild(btn);
    document.body.appendChild(overlay);
    if(!isDraw) setTimeout(()=>createBurstParticles(overlay,color),120);
    if (!isDraw && (net.mode === 'local' || winner !== net.myRole)) {
      setTimeout(() => showWheelOverlay(winner), 900);
    }
  }

  // SPIN WHEEL
  // ════════════════════════════════════════════════════════════
  const WHEEL_DARE = [
    { emoji:'💪', text:'Do 10 push-ups right now' },
    { emoji:'💃', text:'Do your best dance move for 30 seconds' },
    { emoji:'🖊️', text:'Let the winner draw on your arm' },
    { emoji:'🎭', text:'Imitate someone the winner picks, for 1 minute' },
    { emoji:'📱', text:'Send a text the winner dictates' },
    { emoji:'🎤', text:'Speak only in rhymes for 1 minute' },
    { emoji:'📸', text:'Let the winner pick your next profile photo' },
    { emoji:'🎬', text:'Act out a scene — winner picks the movie' },
  ];
  const WHEEL_TRUTH = [
    { emoji:'😳', text:'Confess your biggest crush' },
    { emoji:'🙈', text:'What\'s the most embarrassing thing you\'ve done this year?' },
    { emoji:'🤫', text:'Tell something you\'ve never told anyone' },
    { emoji:'😅', text:'What\'s the worst lie you\'ve ever told?' },
    { emoji:'📱', text:'Who do you text most — and why?' },
    { emoji:'🤔', text:'Something you pretend not to care about but actually do?' },
    { emoji:'😨', text:'What\'s your most irrational fear?' },
    { emoji:'🔍', text:'What would your search history reveal about you?' },
  ];
  const WHEEL_REWARD = [
    { emoji:'☕', text:'They owe you a coffee date' },
    { emoji:'🎬', text:'Movie night — your pick' },
    { emoji:'🍝', text:'They cook you dinner' },
    { emoji:'🌅', text:'Sunset walk together — their treat' },
    { emoji:'💆', text:'They owe you a massage' },
    { emoji:'📍', text:'You choose the next hangout' },
    { emoji:'🎯', text:'You get to dare them something right now' },
    { emoji:'🤔', text:'You get to ask them any truth question' },
  ];

  // One color pair (light, dark) per wheel type for alternating segments.
  const WHEEL_COLORS = {
    dare:   ['#E74C3C', '#B03A2E'],
    truth:  ['#8E44AD', '#6C3483'],
    reward: ['#E67E22', '#B35B10'],
  };
  const WHEEL_POOL = { dare: WHEEL_DARE, truth: WHEEL_TRUTH, reward: WHEEL_REWARD };

  // Replace all overlay content (keep the × close button).
  function wheelSetContent(ov, ...nodes) {
    const close = ov.querySelector('.wheel-close-btn');
    while (ov.firstChild) ov.removeChild(ov.firstChild);
    if (close) ov.appendChild(close);
    nodes.forEach(n => ov.appendChild(n));
  }

  function makeWheelChoiceBtn(emoji, label, sub) {
    const btn = document.createElement('div');
    btn.className = 'wheel-choice-btn'; btn.setAttribute('role','button');
    const eEl = document.createElement('div'); eEl.className = 'wheel-choice-emoji'; eEl.textContent = emoji;
    const lEl = document.createElement('div'); lEl.className = 'wheel-choice-label'; lEl.textContent = label;
    const sEl = document.createElement('div'); sEl.className = 'wheel-choice-sub';   sEl.textContent = sub;
    btn.append(eEl, lEl, sEl);
    return btn;
  }

  // Entry point — called when 🎡 is tapped.
  function showWheelOverlay(winner) {
    clearTimeout(convPromptTimer);
    document.querySelector('.conv-prompt-overlay')?.remove();

    const ov = document.createElement('div');
    ov.className = 'wheel-overlay';

    const closeBtn = document.createElement('div');
    closeBtn.className = 'wheel-close-btn'; closeBtn.textContent = '×';
    closeBtn.setAttribute('role','button');
    closeBtn.addEventListener('click', () => ov.remove());
    ov.appendChild(closeBtn);

    if (net.mode === 'local') {
      // Offline: ask who's spinning so we know which wheel to show.
      wheelShowRoleChoice(ov, winner);
    } else {
      // Online: only the loser spins; go straight to dare / truth choice.
      wheelShowDareTruth(ov, false);
    }

    document.body.appendChild(ov);
  }

  // Offline only — "I won / I lost" selection.
  function wheelShowRoleChoice(ov, winner) {
    const title = document.createElement('div');
    title.className = 'wheel-choice-title'; title.textContent = 'who\'s spinning?';

    const wonBtn = makeWheelChoiceBtn('🏆', 'I Won', 'spin for your reward');
    wonBtn.addEventListener('click', () => wheelShowSpin(ov, 'reward', false));

    const lostBtn = makeWheelChoiceBtn('😅', 'I Lost', 'dare or truth?');
    lostBtn.addEventListener('click', () => wheelShowDareTruth(ov, true));

    wheelSetContent(ov, title, wonBtn, lostBtn);
  }

  // Loser picks dare or truth before spinning.
  // rotated=true for offline (winner reads result across the table); false for online.
  function wheelShowDareTruth(ov, rotated) {
    const title = document.createElement('div');
    title.className = 'wheel-choice-title'; title.textContent = 'your fate awaits';

    const dareBtn = makeWheelChoiceBtn('🎯', 'Dare', 'a physical challenge');
    dareBtn.addEventListener('click', () => wheelShowSpin(ov, 'dare', rotated));

    const truthBtn = makeWheelChoiceBtn('❓', 'Truth', 'answer honestly');
    truthBtn.addEventListener('click', () => wheelShowSpin(ov, 'truth', rotated));

    wheelSetContent(ov, title, dareBtn, truthBtn);
  }

  // The spinning wheel itself, colored by type.
  function wheelShowSpin(ov, type, rotated) {
    const [c1, c2] = WHEEL_COLORS[type];
    const gradient = 'conic-gradient(' +
      Array.from({length:8}, (_,i) => `${i%2?c2:c1} ${i*45}deg ${(i+1)*45}deg`).join(',') + ')';

    const wrap = document.createElement('div'); wrap.className = 'wheel-wrap';
    const ptr  = document.createElement('div'); ptr.className = 'wheel-ptr';
    const disk = document.createElement('div'); disk.className = 'wheel-disk';
    disk.style.background = gradient;
    disk.style.transform = `rotate(${wheelRot}deg)`; disk.style.transition = 'none';
    const hub  = document.createElement('div'); hub.className = 'wheel-hub';
    wrap.append(ptr, disk, hub);

    const typeLabel = document.createElement('div');
    typeLabel.className = 'wheel-type-label';
    typeLabel.style.color = c1;
    typeLabel.textContent = type.toUpperCase();

    const spinBtn = document.createElement('button');
    spinBtn.className = 'wheel-spin-btn'; spinBtn.textContent = 'SPIN';
    spinBtn.addEventListener('click', () => {
      spinBtn.disabled = true;
      const pool = WHEEL_POOL[type];
      const idx = Math.floor(Math.random() * pool.length);
      // Rotate so segment idx centres under the pointer.
      const curOffset  = ((wheelRot % 360) + 360) % 360;
      const targetOffset = idx * 45 + 22.5;
      const delta = ((targetOffset - curOffset) + 360) % 360;
      wheelRot += 5 * 360 + (delta === 0 ? 360 : delta);
      disk.style.transition = 'transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99)';
      disk.style.transform = `rotate(${wheelRot}deg)`;
      setTimeout(() => showWheelResult(ov, pool[idx], rotated, c1), 3620);
    });

    wheelSetContent(ov, wrap, typeLabel, spinBtn);
  }

  // Result card. rotated=true (offline loser) flips 180° so the winner reads it
  // across the table. rotated=false (online, or winner's reward) keeps it upright.
  function showWheelResult(wheelOv, item, rotated, accent) {
    const resultOv = document.createElement('div');
    resultOv.className = 'wheel-result-overlay';

    const card = document.createElement('div');
    card.className = 'wheel-result-card' + (rotated ? ' wheel-result-card--rotated' : '');
    card.style.borderColor = (accent || 'rgba(255,255,255,0.14)') + '55';

    const emojiEl = document.createElement('div');
    emojiEl.className = 'wheel-result-emoji'; emojiEl.textContent = item.emoji;

    const textEl = document.createElement('div');
    textEl.className = 'wheel-result-text'; textEl.textContent = item.text;

    const okBtn = document.createElement('div');
    okBtn.className = 'wheel-result-ok'; okBtn.textContent = 'Got it! 👍';
    okBtn.setAttribute('role','button');
    okBtn.addEventListener('click', () => wheelOv.remove());

    card.append(emojiEl, textEl, okBtn);
    resultOv.appendChild(card);
    wheelOv.appendChild(resultOv);

    // In online mode, share the result with the opponent so they see it too.
    if (net.mode !== 'local') {
      sendNet({ type: 'wheel-result', emoji: item.emoji, text: item.text, accent: accent || null });
    }
  }

  function updateBadgeTurn() {
    if (net.mode==='local') return;
    const el=document.getElementById('badge-turn'); if(!el) return;
    if (G.over)             el.textContent='';
    else if (G.turn===net.myRole) el.textContent='your turn';
    else                    el.textContent='waiting…';
  }

  function updateDots() {
    dotX.classList.toggle('active',G.turn==='X');
    dotO.classList.toggle('active',G.turn==='O');
    updateBadgeTurn();
  }

  function updateScoreBar() {
    function bump(el, val) {
      const v = String(val);
      if (el.textContent !== v) {
        el.textContent = v;
        el.classList.remove('just-bumped');
        void el.offsetWidth;
        el.classList.add('just-bumped');
      }
    }
    bump(document.getElementById('sc-o-w'), G.scores.O);
    bump(document.getElementById('sc-x-w'), G.scores.X);
    document.getElementById('score-rounds').textContent = G.rounds.O + ':' + G.rounds.X;
  }
